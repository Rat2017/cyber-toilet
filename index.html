<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-l10n="title">💩 Cyber Toilet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#efe8e0;background-image:linear-gradient(90deg,rgba(180,165,150,0.12) 1px,transparent 1px),linear-gradient(rgba(180,165,150,0.12) 1px,transparent 1px);background-size:48px 48px;font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;user-select:none;padding:20px}
.app-layout{display:flex;gap:20px;max-width:1100px;width:100%;align-items:flex-start;justify-content:center}
@media(max-width:900px){.app-layout{flex-direction:column;align-items:center}}

/* Panels */
.panel{width:240px;flex-shrink:0;text-align:left;position:sticky;top:20px}
.panel-inner{background:rgba(255,255,255,0.7);border-radius:16px;padding:14px;box-shadow:0 2px 16px rgba(0,0,0,0.06)}
.panel-title{font-size:.82rem;font-weight:700;color:#555;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.panel-toggle{cursor:pointer;color:#bbb;font-size:.75rem;background:none;border:none;font-family:inherit;padding:2px 8px;border-radius:10px}
.panel-toggle:hover{background:rgba(0,0,0,0.05);color:#888}
.panel.collapsed .panel-body{display:none}

/* Leaderboard */
.lb-tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.lb-tab{padding:3px 8px;border-radius:10px;font-size:.65rem;cursor:pointer;color:#999;background:none;border:none;font-family:inherit;transition:all .2s}
.lb-tab:hover{background:rgba(0,0,0,0.05)}
.lb-tab.active{background:#fff;color:#333;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.lb-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:8px;font-size:.72rem;color:#666;margin-bottom:2px}
.lb-item .rank{font-weight:700;color:#999;width:18px;font-size:.68rem}
.lb-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-item .val{font-weight:700;color:#333;font-size:.75rem}
.lb-item:nth-child(1) .rank{color:#f9a825}
.lb-item:nth-child(2) .rank{color:#aaa}
.lb-item:nth-child(3) .rank{color:#b87333}
.lb-empty{font-size:.72rem;color:#ccc;text-align:center;padding:12px 0}

/* Signature Wall */
.sig-list{max-height:280px;overflow-y:auto}
.sig-item{font-size:.72rem;padding:3px 6px;color:#888;border-bottom:1px solid rgba(0,0,0,0.04)}
.sig-item:last-child{border:none}
.sig-item.me{color:#1e88e5;font-weight:600}
.sig-input-row{display:flex;gap:4px;margin-top:8px}
.sig-input{flex:1;border:1px solid #ddd;border-radius:12px;padding:5px 10px;font-size:.72rem;font-family:inherit;outline:none;background:#fff}
.sig-input:focus{border-color:#1e88e5}
.sig-btn{background:#1e88e5;color:#fff;border:none;border-radius:12px;padding:5px 12px;font-size:.72rem;cursor:pointer;font-family:inherit}
.sig-btn:hover{background:#1565c0}

/* Main Content */
.main-content{width:100%;max-width:520px;text-align:center}
.top-bar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:8px;gap:6px}
.lang-switch{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.6);border-radius:20px;padding:3px 10px;font-size:.8rem}
.lang-opt{cursor:pointer;color:#bbb;font-weight:500;transition:color .2s}
.lang-opt:hover{color:#888}
.lang-opt.active{color:#2c2c2c;font-weight:700;cursor:default}
.lang-sep{color:#ddd;font-size:.7rem}
.sync-btn{background:rgba(255,255,255,0.6);border:none;border-radius:20px;padding:3px 12px;font-size:.78rem;font-family:inherit;color:#999;cursor:pointer;transition:background .2s,color .2s}
.sync-btn:hover{background:rgba(255,255,255,0.9);color:#555}
.sync-btn:active{transform:scale(.95)}
h1{font-size:2.2rem;color:#2c2c2c;font-weight:800;letter-spacing:2px;margin-bottom:2px}
.subtitle{font-size:.9rem;color:#999;margin-bottom:6px}
.tagline{font-size:.8rem;color:#bbb;font-style:italic;margin-bottom:20px;line-height:1.5;padding:0 8px}

/* Toilet with click zones */
.toilet-wrapper{position:relative;display:inline-block;-webkit-tap-highlight-color:transparent}
.toilet-svg{width:210px;height:310px;display:block;transition:transform .1s}
.toilet-wrapper.flushing .toilet-svg{animation:shake .55s ease-in-out}
@keyframes shake{0%,100%{transform:translateX(0)}12%{transform:translateX(-7px) rotate(-1deg)}25%{transform:translateX(7px) rotate(1deg)}37%{transform:translateX(-5px) rotate(-.6deg)}50%{transform:translateX(5px) rotate(.6deg)}62%{transform:translateX(-3px)}75%{transform:translateX(3px)}87%{transform:translateX(-1px)}}
.toilet-wrapper.flushing .water{animation:swirl .5s ease-in-out}
.toilet-wrapper.flushing .water-highlight{animation:swirl .5s ease-in-out reverse}
@keyframes swirl{0%{transform:scale(1,1)}30%{transform:scale(.82,.65)}60%{transform:scale(1.08,.88)}100%{transform:scale(1,1)}}
.toilet-wrapper.clogged .water{fill:#e8744a;transition:fill .5s}
.toilet-wrapper.clogged .water-highlight{fill:#f0987a;transition:fill .5s}
.toilet-wrapper.pooping .toilet-svg{animation:poop-bounce .4s ease}
@keyframes poop-bounce{0%{transform:translateY(0)}20%{transform:translateY(-4px)}60%{transform:translateY(2px)}100%{transform:translateY(0)}}

/* Click zones */
.toilet-hit{position:absolute;z-index:4;border-radius:12px;transition:background .2s}
.poop-hit{bottom:6px;left:8%;width:84%;height:58%;cursor:pointer}
.flush-hit{top:20px;left:25%;width:50%;height:30%;cursor:pointer}
.flush-hit:hover{background:rgba(33,150,243,0.1)}
.flush-hit:active{background:rgba(33,150,243,0.18)}
.poop-hit:hover{background:rgba(139,69,19,0.06)}
.poop-hit:active{background:rgba(139,69,19,0.12)}
.poop-hit.disabled,.flush-hit.disabled{cursor:not-allowed;background:transparent!important}


/* Plunger / action buttons row */
.action-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;justify-content:center;min-height:52px}
.action-btn{cursor:pointer;font-size:28px;line-height:1;background:none;border:none;padding:6px 16px;border-radius:30px;transition:background .2s;display:inline-flex;align-items:center;gap:4px}
.action-btn:hover{background:rgba(0,0,0,0.05)}
.action-btn:active{transform:scale(.95)}
.action-btn.hidden{display:none}
.action-label{font-size:.82rem;color:#666;font-family:inherit}

/* Poop fill bar */
.poop-bar-wrap{width:180px;height:12px;background:rgba(0,0,0,0.06);border-radius:10px;margin:10px auto 0;overflow:hidden;position:relative}
.poop-bar-fill{height:100%;background:linear-gradient(90deg,#8d6e63,#6d4c41);border-radius:10px;transition:width .4s ease;width:0%}
.poop-bar-text{font-size:.6rem;color:#999;margin-top:2px}

/* Status */
.status-msg{margin-top:10px;font-size:.95rem;color:#888;min-height:1.6em;transition:color .3s}
.status-msg.clogged{color:#d84315;font-weight:600}
.status-msg.flushing{color:#0288d1}

/* Stats */
.stats-prefix{font-size:.82rem;color:#999;margin:16px 0 2px;text-align:center}
.capacity-line{font-size:.75rem;color:#bbb;margin:0 0 8px;text-align:center}
.stats{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.stat-card{background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 2px 16px rgba(0,0,0,0.06);min-width:90px;flex:1;transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.10)}
.stat-icon{font-size:20px;margin-bottom:1px}
.stat-label{font-size:.72rem;color:#999;margin-bottom:2px;white-space:nowrap}
.stat-value{font-size:1.5rem;font-weight:800;color:#2c2c2c;font-variant-numeric:tabular-nums}
.stat-card:nth-child(1) .stat-value{color:#f9a825}
.stat-card:nth-child(2) .stat-value{color:#1e88e5}
.stat-card:nth-child(3) .stat-value{color:#e53935}
.stat-card:nth-child(4) .stat-value{color:#7b1fa2}
.stat-card:nth-child(5) .stat-value{color:#00897b}
.stat-card:nth-child(6) .stat-value{color:#6d4c41}
.stat-card:nth-child(7) .stat-value{color:#f06292}
.stat-value.bump{animation:bump .25s ease}
@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}

/* Stats toggle */
/* Switch */
.switch-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 0 2px}
.switch-track{width:36px;height:20px;border-radius:12px;background:#ddd;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
.switch-track.on{background:#1e88e5}
.switch-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .3s;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.switch-track.on .switch-knob{transform:translateX(16px)}
.switch-label{font-size:.82rem;color:#999;cursor:pointer;user-select:none}

/* Footer */
.footer{margin-top:24px;font-size:.7rem;color:#ccc;letter-spacing:.3px}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:99;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:24px 28px;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.15);text-align:center;max-height:80vh;overflow-y:auto}
.modal-title{font-size:1rem;font-weight:700;color:#333;margin-bottom:4px}
.modal-desc{font-size:.8rem;color:#999;margin-bottom:12px}
.modal-input{width:100%;border:2px solid #eee;border-radius:14px;padding:8px 14px;font-size:.85rem;font-family:inherit;outline:none;transition:border-color .2s;text-align:center}
.modal-input:focus{border-color:#1e88e5}
.modal-close{position:absolute;top:8px;right:12px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#999}
.modal-box{position:relative}
.modal-hint{font-size:.7rem;color:#bbb;margin-top:8px}
.gift-user-list{max-height:180px;overflow-y:auto;margin:8px 0;text-align:left}
.gift-user-item{padding:6px 10px;cursor:pointer;border-radius:8px;font-size:.8rem;color:#555;transition:background .15s}
.gift-user-item:hover{background:rgba(33,150,243,0.08);color:#1e88e5}
.gift-user-item.selected{background:rgba(33,150,243,0.12);color:#1e88e5;font-weight:600}
.gift-separator{font-size:.7rem;color:#ccc;text-align:center;margin:6px 0}
.gift-preview{font-size:.78rem;color:#888;margin:8px 0}
.gift-btn{background:#6d4c41;color:#fff;border:none;border-radius:14px;padding:8px 24px;font-size:.85rem;cursor:pointer;font-family:inherit;font-weight:600;transition:background .2s}
.gift-btn:hover{background:#4e342e}
.gift-btn:active{transform:scale(.97)}

/* Notification toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:16px;font-size:.85rem;z-index:100;opacity:0;transition:opacity .4s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}

/* Mobile */
@media(max-width:900px){
.panel{position:fixed;top:0;width:280px;height:100%;z-index:90;background:#efe8e0;padding:16px;overflow-y:auto;transform:translateX(-100%);transition:transform .3s ease;box-shadow:2px 0 20px rgba(0,0,0,0.1)}
.panel.open{transform:translateX(0)}
.panel-r{right:0;left:auto;transform:translateX(100%)}
.panel-r.open{transform:translateX(0)}
.panel-close{display:block!important;position:absolute;top:10px;right:10px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#999;z-index:5}
.side-toggle{display:block!important;position:fixed;width:38px;height:38px;border-radius:50%;background:#fff;border:none;box-shadow:0 2px 12px rgba(0,0,0,0.12);cursor:pointer;font-size:1.1rem;z-index:50;transition:transform .2s}
.side-toggle:active{transform:scale(.9)}
.side-toggle-l{left:10px;bottom:80px}
.side-toggle-r{right:10px;bottom:80px}
}
@media(min-width:901px){.side-toggle,.panel-close{display:none!important}}

@media(max-width:480px){
h1{font-size:1.6rem}.subtitle{font-size:.8rem}.tagline{font-size:.72rem;margin-bottom:14px}
.toilet-svg{width:150px;height:230px}.stat-card{padding:7px 10px;min-width:65px}.stat-value{font-size:1.2rem}.stat-icon{font-size:17px}.stat-label{font-size:.6rem}.stats{gap:6px}
.action-btn{font-size:24px;padding:4px 12px}.action-label{font-size:.75rem}
.poop-bar-wrap{width:140px;height:10px}
}
</style>
</head>
<body>

<div class="app-layout">
  <!-- Left Panel: Leaderboard -->
  <div class="panel panel-l collapsed" id="lbPanel">
    <button class="panel-close" onclick="__toggleLB()">✕</button>
    <div class="panel-inner">
      <div class="panel-title">
        <span data-l10n="lb_title">🏆 排行榜</span>
        <button class="panel-toggle" onclick="__toggleLB()" data-l10n="lb_collapse">收起</button>
      </div>
      <div class="panel-body" id="lbBody">
        <div class="lb-tabs" id="lbTabs"></div>
        <div id="lbList"><div class="lb-empty" data-l10n="lb_loading">加载中...</div></div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="top-bar">
      <button class="side-toggle side-toggle-l" onclick="__toggleLB()">🏆</button>
      <div style="flex:1"></div>
      <button class="sync-btn" id="idBtn" onclick="__showIdModal()">👤 ID</button>
      <div class="lang-switch">
        <span class="lang-opt" data-lang="zh" onclick="__toggleLang('zh')">中</span>
        <span class="lang-sep">|</span>
        <span class="lang-opt" data-lang="en" onclick="__toggleLang('en')">EN</span>
      </div>
      <button class="sync-btn" onclick="__syncStats()" data-l10n="sync_btn">🔄 同步</button>
      <button class="side-toggle side-toggle-r" onclick="__toggleSW()">📝</button>
    </div>

    <h1 id="title" data-l10n="title">💩 赛博厕所</h1>
    <p class="subtitle" id="subtitle" data-l10n="subtitle">带薪拉屎模拟器</p>
    <p class="tagline" id="tagline" data-l10n="tagline">让神圣的赛博下水道将我们连接在一起，在工位上也能带薪拉屎</p>

    <!-- Toilet -->
    <div class="toilet-wrapper" id="toilet">
      <svg class="toilet-svg" viewBox="0 0 240 350">
        <rect x="55" y="28" width="130" height="102" rx="8" fill="#fcfcfc" stroke="#d0d0d0" stroke-width="2"/>
        <rect x="48" y="20" width="144" height="18" rx="9" fill="#fff" stroke="#d0d0d0" stroke-width="2"/>
        <rect x="54" y="22" width="132" height="4" rx="2" fill="#f4f4f4"/>
        <rect x="180" y="56" width="14" height="28" rx="4" fill="#c8c8c8" stroke="#aaa" stroke-width="1.5"/>
        <rect x="182" y="62" width="4" height="16" rx="2" fill="#aaa"/>
        <path d="M34 140Q12 222 34 278Q66 332 120 337Q174 332 206 278Q228 222 206 140Z" fill="#fcfcfc" stroke="#d0d0d0" stroke-width="2"/>
        <path d="M39 144Q20 222 39 272Q68 325 120 330Q172 325 201 272Q220 222 201 144Z" fill="#f6f6f6"/>
        <ellipse cx="120" cy="158" rx="88" ry="36" fill="#fff" stroke="#d0d0d0" stroke-width="2"/>
        <ellipse cx="120" cy="158" rx="72" ry="26" fill="#f4f4f4" stroke="#d6d6d6" stroke-width="1.5"/>
        <ellipse cx="120" cy="160" rx="68" ry="22" fill="#efefef"/>
        <ellipse class="water" cx="120" cy="166" rx="58" ry="17" fill="#4fc3f7"/>
        <ellipse class="water-highlight" cx="108" cy="162" rx="28" ry="6" fill="#81d4fa" opacity=".55"/>
        <circle cx="72" cy="160" r="3.5" fill="#e0e0e0" stroke="#ccc" stroke-width=".5"/>
        <circle cx="168" cy="160" r="3.5" fill="#e0e0e0" stroke="#ccc" stroke-width=".5"/>
      </svg>
      <div class="toilet-hit flush-hit" id="flushHit" title="冲水"></div>
      <div class="toilet-hit poop-hit" id="poopHit" title="拉屎"></div>
      <div class="splash-area" id="splashArea"></div>
      <div class="clog-badge" id="clogBadge">🧱 <span data-l10n="clog_badge">堵了</span></div>
    </div>

    <!-- Poop bar -->
    <div class="poop-bar-wrap"><div class="poop-bar-fill" id="poopBar"></div></div>
    <div class="poop-bar-text" id="poopBarText">💩 0L / 15L</div>

    <!-- Status -->
    <div class="status-msg" id="statusMsg" data-l10n="status_default">💡 点击马桶拉屎，点击水箱冲水</div>

    <!-- Action buttons -->
    <div class="action-row">
      <button class="action-btn" id="flushBtn"><span>🚿</span><span class="action-label" data-l10n="flush_btn">冲水</span></button>
      <button class="action-btn" id="plungerBtn" style="display:none"><span>🧹</span><span class="action-label" data-l10n="plunger">通一下</span></button>
      <button class="action-btn hidden" id="giftBtn"><span>📦</span><span class="action-label" data-l10n="gift_btn">搬屎</span></button>
      <button class="action-btn hidden" id="lookbackBtn"><span>👀</span><span class="action-label" data-l10n="lookback">回头看一眼</span></button>
    </div>

    <!-- Stats -->
    <div class="switch-row">
      <div class="switch-track" id="statsToggle" onclick="__toggleStatsView()"><div class="switch-knob"></div></div>
      <span class="switch-label" id="statsLabel" data-l10n="stats_prefix">在你之前已有：</span>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-icon">💼</div><div class="stat-label" data-l10n="stat_people">带薪拉屎人数</div><div class="stat-value" id="statPeople">0</div></div>
      <div class="stat-card"><div class="stat-icon">🚿</div><div class="stat-label" data-l10n="stat_flushes">冲水次数</div><div class="stat-value" id="statFlushes">0</div></div>
      <div class="stat-card"><div class="stat-icon">🔧</div><div class="stat-label" data-l10n="stat_clogs">堵马桶次数</div><div class="stat-value" id="statClogs">0</div></div>
      <div class="stat-card"><div class="stat-icon">💦</div><div class="stat-label" data-l10n="stat_overflow_count">漾出次数</div><div class="stat-value" id="statOverflowCount">0</div></div>
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-label" data-l10n="stat_gift_sent">搬屎</div><div class="stat-value" id="statGiftSent">0</div></div>
      <div class="stat-card"><div class="stat-icon">📪</div><div class="stat-label" data-l10n="stat_gift_recv">被搬</div><div class="stat-value" id="statGiftRecv">0</div></div>
      <div class="stat-card"><div class="stat-icon">👀</div><div class="stat-label" data-l10n="stat_lookbacks">回头看</div><div class="stat-value" id="statLookbacks">0</div></div>
    </div>
    <div class="footer" data-l10n="footer">🚀 Hosted on GitHub Pages ❤️</div>
  </div>

  <!-- Right Panel: Signature Wall -->
  <div class="panel panel-r collapsed" id="swPanel">
    <button class="panel-close" onclick="__toggleSW()">✕</button>
    <div class="panel-inner">
      <div class="panel-title">
        <span data-l10n="sw_title">📝 签名墙</span>
        <button class="panel-toggle" onclick="__toggleSW()" data-l10n="sw_collapse">收起</button>
      </div>
      <div class="panel-body" id="swBody">
        <div class="sig-list" id="sigList"><div class="lb-empty" data-l10n="lb_loading">加载中...</div></div>
        <div class="sig-input-row">
          <input class="sig-input" id="sigInput" placeholder="输入ID" maxlength="12" onkeydown="if(event.key==='Enter')__addSignature()">
          <button class="sig-btn" onclick="__addSignature()">✚</button>
        </div>
      </div>
    </div>
  </div>
</div>


<!-- Gift Modal -->
<div class="modal-overlay" id="giftModal">
  <div class="modal-box">
    <button class="modal-close" onclick="__hideGiftModal()">✕</button>
    <div class="modal-title" data-l10n="gift_title">📦 搬屎</div>
    <div class="modal-desc" data-l10n="gift_desc">选择要搬给谁，或输入自定义ID</div>
    <div class="gift-preview" id="giftPreview">当前 💩 <span id="giftVol">0</span>L</div>
    <div class="gift-user-list" id="giftUserList"></div>
    <div class="gift-separator">— 或自定义 —</div>
    <input class="modal-input" id="giftInput" placeholder="输入目标ID" maxlength="12" onkeydown="if(event.key==='Enter')__sendGift()">
    <button class="gift-btn" onclick="__sendGift()" data-l10n="gift_send">📦 搬走</button>
    <div class="modal-hint" data-l10n="gift_hint">搬过去的屎会在对方登录时显示</div>
  </div>
</div>

<!-- ID Modal -->
<div class="modal-overlay" id="idModal">
  <div class="modal-box">
    <button class="modal-close" onclick="__hideIdModal()">✕</button>

function fetchStats(){
return fetch(GIST_API,{headers:{Authorization:'token '+GIST_TOKEN}})
.then(function(r){return r.json()})
.then(function(data){
var raw;try{raw=JSON.parse(data.files['stats.json'].content)}catch(e){return}

var g=raw.global||{};

serverPoopVolume=0;serverOverflowCount=g.overflowCount||0;serverOverflowVolume=g.overflowVolume||0;serverLookBacks=g.lookBacks||0;visitorCount=g.visitorCount||0;

usersData=raw.users||{};userList=raw.userList||[];poopGifts=raw.poopGifts||{};

if(!serverClogged&&(currentStatusKey==='status_clogged'||currentStatusKey==='status_unclog_fail'))setStatus('status_default','');
}).catch(function(e){console.warn('Gist fetch:',e)})
}

function syncToGist(){
return fetch(GIST_API,{method:'PATCH',headers:{Authorization:'token '+GIST_TOKEN,'Content-Type':'application/json'},
body:JSON.stringify({files:{'stats.json':{content:JSON.stringify({
global:{people:serverPeople,flushes:serverFlushes,clogs:serverClogs,clogged:serverClogged,
poopVolume:serverPoopVolume,overflowCount:serverOverflowCount,overflowVolume:serverOverflowVolume,lookBacks:serverLookBacks,visitorCount:visitorCount},
users:usersData,userList:userList,poopGifts:poopGifts})}}})})
.then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
.then(function(data){
var s;try{s=JSON.parse(data.files['stats.json'].content)}catch(e){throw new Error('parse')}
var g=s.global||{};
serverPeople=g.people||0;serverFlushes=g.flushes||0;serverClogs=g.clogs||0;serverClogged=!!g.clogged;
serverPoopVolume=0;serverOverflowCount=g.overflowCount||0;serverOverflowVolume=g.overflowVolume||0;serverLookBacks=g.lookBacks||0;visitorCount=g.visitorCount||0;
usersData=s.users||{};userList=s.userList||[];poopGifts=s.poopGifts||{};
updateStatsUI();updateCloggedUI();updatePoopUI();renderLB();renderSW();
}).catch(function(e){console.warn('Gist sync:',e)})
}

syncToGist();
showToast((lang==='zh'?'搬了 '+vol.toFixed(1)+'L 给 '+target:'Sent '+vol.toFixed(1)+'L to '+target));
}

btn.onclick=function(){lbCategory=k;renderLBTabs();renderLBList()};

})
}
function renderLBList(){
lbList.innerHTML='';
var entries=[];
Object.keys(usersData).forEach(function(id){
var d=usersData[id];if(!d)return;
var val=0;
if(lbCategory==='flushes')val=d.flushes||0;
else if(lbCategory==='clogs')val=d.clogs||0;
else if(lbCategory==='goldenPython')val=d.goldenPython||0;
else if(lbCategory==='strawberryTower')val=d.strawberryTower||0;
else if(lbCategory==='lookBacks')val=d.lookBacks||0;
else if(lbCategory==='overflowCount')val=d.overflowCount||0;
else if(lbCategory==='giftSentCount')val=d.giftSentCount||0;
else if(lbCategory==='giftRecvCount')val=d.giftRecvCount||0;
if(val>0)entries.push({id:id,val:val})
});
entries.sort(function(a,b){return b.val-a.val});
if(entries.length===0){lbList.innerHTML='<div class="lb-empty">'+t('lb_empty')+'</div>';return}
entries.slice(0,15).forEach(function(e,i){
var div=document.createElement('div');div.className='lb-item';if(e.id===myUserId)div.style.background='rgba(33,150,243,0.08)';
var rank=document.createElement('span');rank.className='rank';rank.textContent=i+1;div.appendChild(rank);
var name=document.createElement('span');name.className='name';name.textContent=e.id;div.appendChild(name);
var val=document.createElement('span');val.className='val';val.textContent=e.val;div.appendChild(val);
lbList.appendChild(div)
})
}
function renderLB(){renderLBTabs();renderLBList()}
function __toggleLB(){var p=$('lbPanel');if(window.innerWidth<=900){p.classList.toggle('open')}else{p.classList.toggle('collapsed');$('lbBody').style.display=p.classList.contains('collapsed')?'none':''}}

// ===== Signature Wall =====
function renderSW(){
sigList.innerHTML='';
if(!userList||userList.length===0){sigList.innerHTML='<div class="lb-empty">'+t('lb_empty')+'</div>';return}
userList.forEach(function(id){
var div=document.createElement('div');div.className='sig-item';if(id===myUserId)div.classList.add('me');
div.textContent=id;sigList.appendChild(div)
})
}
function __toggleSW(){var p=$('swPanel');if(window.innerWidth<=900){p.classList.toggle('open')}else{p.classList.toggle('collapsed');$('swBody').style.display=p.classList.contains('collapsed')?'none':''}}
function __addSignature(){
var id=sigInput.value.trim()||myUserId;
if(!id||id.length<1)return;
if(id.length>12)id=id.slice(0,12);
var isNew=userList.indexOf(id)===-1;
if(isNew){userList.push(id);userList.sort();syncToGist();renderLB()}
// If not logged in, also set as current ID
if(!myUserId){saveUser(id);if(isNew)__confirmId()}
sigInput.value='';renderSW()
}

// ===== Init =====
lang=detectLang();applyLanguage();loadUser();updateIdBtn();applyStatsView();fetchStats().then(function(){
// Count unique visitor after fetchStats to avoid overwrite race
if(!localStorage.getItem('ct-visitor')){localStorage.setItem('ct-visitor','1');visitorCount++;updateStatsUI();syncToGist()}
});

// Event wiring
poopHit.addEventListener('click',handlePoop);
flushHit.addEventListener('click',handleFlush);
flushBtn.addEventListener('click',handleFlush);
plungerBtn.addEventListener('click',handlePlunge);
giftBtn.addEventListener('click',__showGiftModal);
lookbackBtn.addEventListener('click',handleLookBack);

document.addEventListener('keydown',function(e){
if(e.key===' '||e.key==='Enter'){handleFlush();e.preventDefault()}
if(e.key==='p'||e.key==='P'){handlePoop();e.preventDefault()}
if(e.key==='g'||e.key==='G'){__showGiftModal();e.preventDefault()}
});

if(!serverClogged)setStatus('status_default','');

// Expose handlers to global scope (for HTML onclick)
window.__showIdModal=__showIdModal;window.__hideIdModal=__hideIdModal;window.__confirmId=__confirmId;
window.__toggleStatsView=__toggleStatsView;
window.__addSignature=__addSignature;
window.__toggleLB=__toggleLB;window.__toggleSW=__toggleSW;
window.__showGiftModal=__showGiftModal;window.__hideGiftModal=__hideGiftModal;window.__sendGift=__sendGift;
window.__toggleLang=toggleLang;window.__syncStats=__syncStats;

})();
</script>
</body>
