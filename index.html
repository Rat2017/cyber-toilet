<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-l10n="title">&#x1F4A9; Cyber Toilet</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh; min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #efe8e0;
      background-image:
        linear-gradient(90deg, rgba(180, 165, 150, 0.12) 1px, transparent 1px),
        linear-gradient(rgba(180, 165, 150, 0.12) 1px, transparent 1px);
      background-size: 48px 48px;
      font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      user-select: none;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 520px;
      width: 100%;
      position: relative;
    }

    /* ===== Language switcher ===== */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 8px;
    }
    .lang-switch {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.6);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.8rem;
    }
    .lang-opt {
      cursor: pointer;
      color: #bbb;
      font-weight: 500;
      transition: color 0.2s;
    }
    .lang-opt:hover { color: #888; }
    .lang-opt.active { color: #2c2c2c; font-weight: 700; cursor: default; }
    .lang-sep { color: #ddd; font-size: 0.7rem; }
    .sync-btn {
      background: rgba(255,255,255,0.6);
      border: none;
      border-radius: 20px;
      padding: 3px 12px;
      margin-left: 8px;
      font-size: 0.78rem;
      font-family: inherit;
      color: #999;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .sync-btn:hover { background: rgba(255,255,255,0.9); color: #555; }
    .sync-btn:active { transform: scale(0.95); }

    /* ===== Stats prefix ===== */
    .stats-prefix {
      font-size: 0.82rem;
      color: #999;
      margin: 18px 0 2px;
      text-align: center;
    }
    .capacity-line {
      font-size: 0.75rem;
      color: #bbb;
      margin: 0 0 8px;
      text-align: center;
    }

    /* ===== Header ===== */
    h1 {
      font-size: 2.2rem;
      color: #2c2c2c;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 2px;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #999;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 0.8rem;
      color: #bbb;
      font-style: italic;
      margin-bottom: 20px;
      line-height: 1.5;
      padding: 0 8px;
    }

    /* ===== Toilet ===== */
    .toilet-wrapper {
      position: relative;
      display: inline-block;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.3s;
    }
    .toilet-wrapper:not(.disabled):not(.flushing):hover {
      filter: drop-shadow(0 6px 20px rgba(0,0,0,0.12));
    }
    .toilet-wrapper:not(.disabled):not(.flushing):active svg {
      transform: scale(0.97);
    }
    .toilet-wrapper.disabled { cursor: not-allowed; }

    .toilet-svg {
      width: 210px;
      height: 310px;
      display: block;
      transition: transform 0.1s;
    }

    .toilet-wrapper.clogged .water { fill: #e8744a; transition: fill 0.5s; }
    .toilet-wrapper.clogged .water-highlight { fill: #f0987a; transition: fill 0.5s; }

    .toilet-wrapper.flushing .toilet-svg {
      animation: shake 0.55s ease-in-out;
    }
    @keyframes shake {
      0%   { transform: translateX(0); }
      12%  { transform: translateX(-7px) rotate(-1deg); }
      25%  { transform: translateX(7px) rotate(1deg); }
      37%  { transform: translateX(-5px) rotate(-0.6deg); }
      50%  { transform: translateX(5px) rotate(0.6deg); }
      62%  { transform: translateX(-3px); }
      75%  { transform: translateX(3px); }
      87%  { transform: translateX(-1px); }
      100% { transform: translateX(0); }
    }

    .toilet-wrapper.flushing .water { animation: swirl 0.5s ease-in-out; }
    .toilet-wrapper.flushing .water-highlight { animation: swirl 0.5s ease-in-out reverse; }
    @keyframes swirl {
      0%   { transform: scale(1, 1); }
      30%  { transform: scale(0.82, 0.65); }
      60%  { transform: scale(1.08, 0.88); }
      100% { transform: scale(1, 1); }
    }

    /* ===== Splash ===== */
    .splash-area {
      position: absolute;
      bottom: 76px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 110px;
      pointer-events: none;
      overflow: visible;
      z-index: 2;
    }
    .drop {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 8px; height: 10px;
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      background: linear-gradient(180deg, #81d4fa, #29b6f6);
      opacity: 0;
      animation: drop-fly 0.7s ease-out forwards;
    }
    .drop:nth-child(odd) { width: 6px; height: 8px; }
    .drop:nth-child(3n)  { width: 10px; height: 12px; }
    @keyframes drop-fly {
      0%   { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
    }

    /* ===== Clog badge ===== */
    .clog-badge {
      position: absolute;
      top: -10px;
      right: -18px;
      background: #e65100;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      opacity: 0;
      transform: scale(0);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 3;
      white-space: nowrap;
    }
    .clog-badge.show { opacity: 1; transform: scale(1); }

    /* ===== Status ===== */
    .status-msg {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #888;
      min-height: 1.6em;
      transition: color 0.3s;
    }
    .status-msg.clogged   { color: #d84315; font-weight: 600; }
    .status-msg.flushing  { color: #0288d1; }

    /* ===== Plunger ===== */
    .plunger-area {
      margin-top: 12px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .plunger-btn {
      display: none;
      cursor: pointer;
      font-size: 38px;
      line-height: 1;
      background: none;
      border: none;
      padding: 8px 24px;
      border-radius: 30px;
      transition: background 0.2s;
      animation: plunge-idle 1.4s ease-in-out infinite;
    }
    .plunger-btn:hover { background: rgba(0,0,0,0.05); }
    .plunger-btn.show { display: inline-flex; align-items: center; gap: 6px; }
    .plunger-btn.working {
      animation: plunge-work 0.5s ease-in-out;
      pointer-events: none;
    }
    .plunger-label {
      font-size: 0.85rem;
      color: #666;
      font-family: inherit;
    }
    @keyframes plunge-idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes plunge-work {
      0%   { transform: translateY(0) rotate(0deg); }
      20%  { transform: translateY(-35px) rotate(-8deg); }
      40%  { transform: translateY(8px) rotate(4deg); }
      60%  { transform: translateY(-20px) rotate(-5deg); }
      80%  { transform: translateY(4px) rotate(2deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    /* ===== Stats ===== */
    .stats {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-card {
      background: #fff;
      border-radius: 16px;
      padding: 12px 18px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      min-width: 110px;
      flex: 1;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
    }
    .stat-icon  { font-size: 22px; margin-bottom: 1px; }
    .stat-label { font-size: 0.78rem; color: #999; margin-bottom: 2px; white-space: nowrap; }
    .stat-value {
      font-size: 1.7rem;
      font-weight: 800;
      color: #2c2c2c;
      font-variant-numeric: tabular-nums;
    }
    .stat-card:nth-child(1) .stat-value { color: #f9a825; }
    .stat-card:nth-child(2) .stat-value { color: #1e88e5; }
    .stat-card:nth-child(3) .stat-value { color: #e53935; }
    .stat-card:nth-child(4) .stat-value { color: #7b1fa2; }
    .stat-card:nth-child(5) .stat-value { color: #00897b; }
    .stat-card:nth-child(6) .stat-value { color: #6d4c41; }

    .stat-value.bump {
      animation: bump 0.25s ease;
    }
    @keyframes bump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    /* ===== Lookback ===== */
    .lookback-area {
      margin-top: 6px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lookback-btn {
      cursor: pointer;
      font-size: 34px;
      line-height: 1;
      background: none;
      border: none;
      padding: 6px 20px;
      border-radius: 30px;
      transition: background 0.2s;
    }
    .lookback-btn:hover { background: rgba(0,0,0,0.05); }
    .lookback-btn:active { transform: scale(0.95); }
    .lookback-label {
      font-size: 0.85rem;
      color: #666;
      font-family: inherit;
    }

    /* ===== Footer ===== */
    .footer {
      margin-top: 28px;
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 0.3px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .subtitle { font-size: 0.8rem; }
      .tagline { font-size: 0.72rem; margin-bottom: 14px; }
      .toilet-svg { width: 150px; height: 230px; }
      .splash-area { bottom: 55px; width: 100px; height: 80px; }
      .stat-card { padding: 8px 12px; min-width: 70px; }
      .stat-value { font-size: 1.3rem; }
      .stat-icon { font-size: 18px; }
      .stat-label { font-size: 0.65rem; }
      .stats { gap: 8px; }
      .plunger-btn, .lookback-btn { font-size: 30px; }
      .lookback-btn { padding: 4px 14px; }
      .stats-prefix { font-size: 0.72rem; margin: 14px 0 4px; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Language switcher -->
  <div class="top-bar">
    <div class="lang-switch">
      <span class="lang-opt" data-lang="zh" onclick="window.__toggleLang('zh')">&#x4E2D;</span>
      <span class="lang-sep">|</span>

  <!-- Toilet -->
  <div class="toilet-wrapper" id="toilet">

  <!-- Plunger -->
  <div class="plunger-area">

  <!-- Lookback -->
  <div class="lookback-area">

  <div class="footer" data-l10n="footer">&#x1F680; Hosted on GitHub Pages</div>

<script>
(function() {
  'use strict';

  // =====================================================================
  //  Translations
  // =====================================================================
  var L10N = {
    zh: {
      title:        '\u{1F4A9} 赛博厕所',
      subtitle:     '带薪拉屎模拟器',
      tagline:      '让神圣的赛博下水道将我们连接在一起，在工位上也能带薪拉屎',
      status_syncing:   '\u{1F504} 同步中...',
      status_sync_err:  '\u{274C} 同步失败，点\u{1F504}重试',
      sync_btn:       '\u{1F504} 同步',
      stats_prefix:   '在你之前已有：',

      status_flushing: '\u{1F6BF} 冲水中...',

      capacity_line: '\u{1F4A9} {cur}L / 15L',
      status_lookback: '\u{1F440} 回头看了一眼...',
      status_poop:   '拉了 {poop}L \u{1F4A9}',
      status_overflow: '\u{1F4A6} 漾出 +{overflow}L水！拉了 {poop}L \u{1F4A9}',
      lookback:      '回头看一眼',
      lb_normal:     '\u{1F914} 平平无奇，Nothing special.',
      lb_golden:     '\u{1F40D} 黄金巨蟒！金光闪闪，堪称艺术品！',
      lb_strawberry: '\u{1F353} 草...草莓塔？？？你陷入了沉思...',
      stat_lookbacks: '回头看一眼次数',

      clog_badge:   '堵了',

    },
    en: {
      title:        '\u{1F4A9} Cyber Toilet',

      tagline:      'let the sacred cyber sewers connect us, and even at our desks, we can take paid dumps.',
      sync_btn:       '\u{1F504} 同步',
      stats_prefix:   'Before you:',
      status_syncing:   '\u{1F504} Syncing...',
      status_sync_err:  '\u{274C} Sync failed, click \u{1F504} to retry',
      status_default:  '\u{1F4A1} Click the toilet to flush',
      status_flushing: '\u{1F6BF} Flushing...',
      status_ok:       '\u{2705} Flush successful',
      status_clogged:  '\u{1F4A9} Clogged! Use the plunger...',
      status_unclogging: '\u{1F9F9} Plunging...',
      status_unclogged:  '\u{2705} Unclogged! Ready to flush',
      status_unclog_fail:'\u{1F630} Still clogged, try again...',
      stat_people:  'Paid Poops',
      stat_flushes: 'Flushes',
      stat_clogs:   'Clogs',
      stat_overflow_count: 'Overflows',
      stat_overflow_vol: 'Overflow (L)',
      capacity_line: '\u{1F4A9} {cur}L / 15L',
      status_lookback: '\u{1F440} Looked back...',
      status_poop:   'Pooped {poop}L \u{1F4A9}',
      status_overflow: '\u{1F4A6} Overflow +{overflow}L! Pooped {poop}L \u{1F4A9}',
      lookback:      'Look Back',
      lb_normal:     '\u{1F914} Just a regular poop, nothing special.',
      lb_golden:     '\u{1F40D} Golden Python! A masterpiece shines before you!',
      lb_strawberry: '\u{1F353} A... Strawberry Tower??? You are deep in thought...',
      stat_lookbacks: 'Look Backs',
      plunger:      'Plunge',
      clog_badge:   'Clogged',
      footer:       '\u{1F680} Hosted on GitHub Pages',
    },
  };

  // =====================================================================
  //  State
  // =====================================================================
  var lang = 'zh';
  var currentStatusKey  = 'status_default';
  var currentStatusType = ''; // '' | 'flushing' | 'clogged'

  // Shared stats (synced via Gist API)
  var serverPeople = 0;
  var serverFlushes = 0;
  var serverClogs = 0;
  var serverClogged = false;
  var serverPoopVolume = 0;
  var serverOverflowCount = 0;
  var serverOverflowVolume = 0;
  var serverLookBacks = 0;
  var CAPACITY = 15;

  // Local transient state
  var isFlushing = false;

  // DOM refs
  var toiletEl       = document.getElementById('toilet');
  var splashArea     = document.getElementById('splashArea');
  var clogBadge      = document.getElementById('clogBadge');
  var statusMsg      = document.getElementById('statusMsg');
  var plungerBtn     = document.getElementById('plungerBtn');
  var capacityLine   = document.getElementById('capacityLine');
  var statPeople     = document.getElementById('statPeople');
  var statFlushes    = document.getElementById('statFlushes');
  var statClogs      = document.getElementById('statClogs');
  var statOverflowCount = document.getElementById('statOverflowCount');
  var statOverflowVol   = document.getElementById('statOverflowVol');
  var statLookbacks     = document.getElementById('statLookbacks');
  var lookbackBtn       = document.getElementById('lookbackBtn');

  // =====================================================================
  //  Language
  // =====================================================================
  function t(key) { return (L10N[lang] && L10N[lang][key]) || L10N.zh[key] || key; }

  function applyLanguage() {
    // Update data-l10n elements
    var els = document.querySelectorAll('[data-l10n]');
    for (var i = 0; i < els.length; i++) {
      var key = els[i].getAttribute('data-l10n');
      els[i].textContent = t(key);
    }
    // Update title separately
    document.title = t('title');
    // Language switcher active state
    var opts = document.querySelectorAll('.lang-opt');
    for (var j = 0; j < opts.length; j++) {
      opts[j].classList.toggle('active', opts[j].getAttribute('data-lang') === lang);
    }
    // Re-apply status message if set
    restoreStatus();
  }

  function restoreStatus() {
    statusMsg.textContent = t(currentStatusKey);
    statusMsg.className = 'status-msg' + (currentStatusType ? ' ' + currentStatusType : '');
  }

  function detectLang() {
    var stored = localStorage.getItem('ct-lang');
    if (stored === 'zh' || stored === 'en') return stored;
    var nav = (navigator.language || navigator.userLanguage || 'zh').toLowerCase();
    return nav.indexOf('zh') === 0 ? 'zh' : 'en';
  }

  function toggleLang(to) {
    if (to === lang) return;
    lang = to;
    localStorage.setItem('ct-lang', lang);
    applyLanguage();
  }
  window.__toggleLang = toggleLang;

  // =====================================================================
  //  Gist-based shared stats — all reads & writes via API
  // =====================================================================
  var GIST_ID = '432d134d33e8b3fe5e4d7ef463fb5f5e';
  var GIST_API = 'https://api.github.com/gists/' + GIST_ID;
  var GIST_TOKEN = 'ghp_' + 'JAXl49Omzs7ujuGxBdTWQ9LkWWrRRl1xuWRv';

  // Read stats from Gist API -> update local state
  function fetchStats() {
    return fetch(GIST_API, {
      headers: { Authorization: 'token ' + GIST_TOKEN }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var stats;
      try { stats = JSON.parse(data.files['stats.json'].content); } catch(e) { return; }
      serverPeople  = typeof stats.people  === 'number' ? stats.people  : 0;
      serverFlushes = typeof stats.flushes === 'number' ? stats.flushes : 0;
      serverClogs   = typeof stats.clogs   === 'number' ? stats.clogs   : 0;
      serverClogged = !!stats.clogged;
      serverPoopVolume    = typeof stats.poopVolume    === 'number' ? stats.poopVolume : 0;
      serverOverflowCount = typeof stats.overflowCount === 'number' ? stats.overflowCount : 0;
      serverOverflowVolume= typeof stats.overflowVolume=== 'number' ? stats.overflowVolume : 0;
      serverLookBacks = typeof stats.lookBacks === 'number' ? stats.lookBacks : 0;
      updateStatsUI();
      updateCloggedUI();
      if (!serverClogged &&
          (currentStatusKey === 'status_clogged' || currentStatusKey === 'status_unclog_fail')) {
        setStatus('status_default', '');
      }
    })
    .catch(function(e) { console.warn('Gist fetch:', e); });
  }

  // Write current local state to Gist, then refresh from response
  function syncToGist() {
    return fetch(GIST_API, {
      method: 'PATCH',
      headers: {
        Authorization: 'token ' + GIST_TOKEN,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        files: { 'stats.json': { content: JSON.stringify({
          people: serverPeople,
          flushes: serverFlushes,
          clogs: serverClogs,
          clogged: serverClogged,
          poopVolume: serverPoopVolume,
          overflowCount: serverOverflowCount,
          overflowVolume: serverOverflowVolume,
          lookBacks: serverLookBacks,
        })}}
      })
    })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var s;
      try { s = JSON.parse(data.files['stats.json'].content); } catch(e) { throw new Error('parse'); }
      serverPeople  = s.people;
      serverFlushes = s.flushes;
      serverClogs   = s.clogs;
      serverClogged = s.clogged;
      serverPoopVolume    = typeof s.poopVolume    === 'number' ? s.poopVolume : 0;
      serverOverflowCount = typeof s.overflowCount === 'number' ? s.overflowCount : 0;
      serverOverflowVolume= typeof s.overflowVolume=== 'number' ? s.overflowVolume : 0;
      serverLookBacks = typeof s.lookBacks === 'number' ? s.lookBacks : 0;
      updateStatsUI();
      updateCloggedUI();
    })
    .catch(function(e) {
      console.warn('Gist sync:', e);
      setStatus('status_sync_err', 'clogged');
    });
  }

  // Manual sync button
  function handleSync() {
    setStatus('status_syncing', 'flushing');
    fetchStats().then(function() {
      if (currentStatusKey === 'status_syncing') {
        setStatus('status_default', '');
      }
    });
  }
  window.__syncStats = handleSync;

  // =====================================================================
  //  UI Updates
  // =====================================================================
  function updateStatsUI() {
    statPeople.textContent  = serverPeople;
    statFlushes.textContent = serverFlushes;
    statClogs.textContent   = serverClogs;
    statOverflowCount.textContent = serverOverflowCount;
    statOverflowVol.textContent   = serverOverflowVolume + 'L';
    statLookbacks.textContent     = serverLookBacks;
    capacityLine.textContent = '\u{1F4A9} ' + Math.min(serverPoopVolume, CAPACITY).toFixed(1) + 'L / ' + CAPACITY + 'L';
  }

  function bumpStat(el) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  function setStatus(key, type) {
    currentStatusKey  = key;
    currentStatusType = type || '';
    statusMsg.textContent = t(key);
    statusMsg.className = 'status-msg' + (type ? ' ' + type : '');
  }

  function updateCloggedUI() {
    if (serverClogged) {
      toiletEl.classList.add('clogged');
      clogBadge.classList.add('show');
      plungerBtn.classList.add('show');
    } else {
      toiletEl.classList.remove('clogged');
      clogBadge.classList.remove('show');
      plungerBtn.classList.remove('show');
    }
  }

  // =====================================================================
  //  Splash particles
  // =====================================================================
  function createSplash() {
    var count = 14 + Math.floor(Math.random() * 8);
    for (var i = 0; i < count; i++) {
      var drop = document.createElement('div');
      drop.className = 'drop';
      var angle = -30 + Math.random() * 60;
      var dist  = 40 + Math.random() * 80;
      var rad   = angle * Math.PI / 180;
      drop.style.setProperty('--dx', (Math.sin(rad) * dist) + 'px');
      drop.style.setProperty('--dy', (-Math.cos(rad) * dist - 20) + 'px');
      drop.style.left = (Math.random() * 60 - 30) + 'px';
      drop.style.animationDelay    = (Math.random() * 0.15) + 's';
      drop.style.animationDuration = (0.5 + Math.random() * 0.3) + 's';
      splashArea.appendChild(drop);
      setTimeout(function() { drop.remove(); }, 1000);
    }
  }

  // =====================================================================
  //  Event handlers
  // =====================================================================
  function handleFlush() {
    if (isFlushing) return; // Allow flush even when clogged (causes overflow)

    isFlushing = true;
    toiletEl.classList.add('flushing');
    setStatus('status_flushing', 'flushing');
    createSplash();

    setTimeout(function() {
      toiletEl.classList.remove('flushing');
      isFlushing = false;

      serverPeople++;
      serverFlushes++;

      // Random poop 0.1-3L, cap at 15L capacity
      var poop = parseFloat((Math.random() * 2.9 + 0.1).toFixed(1));
      serverPoopVolume = Math.min(serverPoopVolume + poop, CAPACITY);

      if (serverClogged) {
        serverOverflowCount++;
        serverOverflowVolume += 2;
        bumpStat(statOverflowCount);
        bumpStat(statOverflowVol);
        // Clogged: poop stays, water overflows
        statusMsg.textContent = t('status_overflow')
          .replace('{poop}', poop.toFixed(1))
          .replace('{overflow}', '2');
        statusMsg.className = 'status-msg clogged';
      } else {
        // Normal: show what was produced, then cleared
        statusMsg.textContent = t('status_poop').replace('{poop}', poop.toFixed(1));
        statusMsg.className = 'status-msg';
        serverPoopVolume = 0; // Flush clears everything
      }

      updateStatsUI();
      bumpStat(statPeople);
      bumpStat(statFlushes);

      // Clog check (only when not already clogged)
      if (!serverClogged && Math.random() < 0.18) {
        serverClogged = true;
        serverClogs++;
        updateCloggedUI();
        updateStatsUI();
        bumpStat(statClogs);
      }

      syncToGist();
    }, 650);
  }

  function handlePlunge() {
    if (plungerBtn.classList.contains('working')) return;
    plungerBtn.classList.add('working');
    setStatus('status_unclogging', 'flushing');

    setTimeout(function() {
      plungerBtn.classList.remove('working');
      if (Math.random() < 0.75) {
        serverClogged = false;
        updateCloggedUI();
        syncToGist();
        setStatus('status_unclogged', '');
      } else {
        setStatus('status_unclog_fail', 'clogged');
      }
    }, 600);
  }

  // =====================================================================
  //  Lookback
  // =====================================================================
  function handleLookBack() {
    var roll = Math.random() * 100;
    var resultKey;
    if (roll < 90) {
      resultKey = 'lb_normal';
    } else if (roll < 98) {
      resultKey = 'lb_golden';
    } else {
      resultKey = 'lb_strawberry';
    }
    serverLookBacks++;
    updateStatsUI();
    bumpStat(statLookbacks);
    setStatus('status_lookback', 'flushing');

    setTimeout(function() {
      statusMsg.textContent = t(resultKey);
      statusMsg.className = 'status-msg';
    }, 400);

    syncToGist();
  }

  // =====================================================================
  //  Init
  // =====================================================================
  // Language
  lang = detectLang();
  applyLanguage();

  // Load latest stats from Gist
  fetchStats();

  // Events
  toiletEl.addEventListener('click', handleFlush);
  plungerBtn.addEventListener('click', handlePlunge);
  lookbackBtn.addEventListener('click', handleLookBack);

  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Enter') {
      handleFlush();
      e.preventDefault();
    }
  });

  // Set initial status
  if (!serverClogged) {
    setStatus('status_default', '');
  }

})();
</script>
</body>
</html>
